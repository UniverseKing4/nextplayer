name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - run: chmod +x gradlew
        
      - run: ./gradlew assembleRelease
        
      - name: Sign APKs
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > keystore.jks
          mkdir -p signed
          for APK in app/build/outputs/apk/release/*-unsigned.apk; do
            BASENAME=$(basename "$APK" -unsigned.apk)
            $ANDROID_HOME/build-tools/34.0.0/zipalign -v -p 4 "$APK" aligned.apk
            $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks keystore.jks --ks-key-alias "${{ secrets.ALIAS }}" --ks-pass pass:"${{ secrets.KEY_STORE_PASSWORD }}" --key-pass pass:"${{ secrets.KEY_PASSWORD }}" --out "signed/${BASENAME}.apk" aligned.apk
            rm aligned.apk
          done
          rm keystore.jks
          rm app/build/outputs/apk/release/*-unsigned.apk
          mv signed/* app/build/outputs/apk/release/
          rmdir signed
        
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          
      - if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
