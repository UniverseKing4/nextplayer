name: Build and Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode keystore
        run: echo "${{ secrets.SIGNING_KEY }}" | base64 -d > release.keystore
          
      - name: Build signed APKs
        run: ./gradlew assembleRelease
        env:
          KEYSTORE: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Get version
        id: version
        run: echo "name=$(grep 'versionName =' app/build.gradle.kts | awk -F'"' '{print $2}')" >> $GITHUB_OUTPUT

      - name: Rename APKs
        run: |
          cd app/build/outputs/apk/release
          mv app-arm64-v8a-release.apk nextplayer-v${{ steps.version.outputs.name }}-arm64-v8a.apk
          mv app-armeabi-v7a-release.apk nextplayer-v${{ steps.version.outputs.name }}-armeabi-v7a.apk
          mv app-universal-release.apk nextplayer-v${{ steps.version.outputs.name }}-universal.apk
          mv app-x86-release.apk nextplayer-v${{ steps.version.outputs.name }}-x86.apk
          mv app-x86_64-release.apk nextplayer-v${{ steps.version.outputs.name }}-x86_64.apk
        
      - uses: actions/upload-artifact@v4
        with:
          name: signed-apks
          path: app/build/outputs/apk/release/nextplayer-*.apk
          
      - uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/nextplayer-*.apk
          tag_name: v${{ steps.version.outputs.name }}
          name: v${{ steps.version.outputs.name }}
          body: "Automated release for version ${{ steps.version.outputs.name }}"
          draft: false
          prerelease: false
          make_latest: true
